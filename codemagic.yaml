workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys # Paneldeki grup adıyla (image_bdaa9c.png) birebir AYNI olmalı
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 1 - Hazırlık ve Web Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform Senkronizasyon
        script: |
          npx cap sync ios
      - name: 3 - Manuel Sertifika ve Profil Kurulumu (Kesin Çözüm)
        script: |
          # 1. Anahtar Zincirini Hazırla
          keychain initialize
          
          # 2. Sertifikayı (.p12) Kur
          # Paneldeki dosya değişkenini doğrudan kullanıyoruz
          keychain add-certificates \
            --certificate "$CM_CERTIFICATE" \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # 3. Provisioning Profile (.mobileprovision) Kur
          # Komut hatası almamak için dosyayı doğrudan Apple'ın aradığı gizli klasöre kopyalıyoruz
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$CM_PROVISIONING_PROFILE" "$PROFILES_DIR/"
          
          echo "✅ Sertifika ve Profil başarıyla yüklendi!"
      - name: 4 - iOS IPA Paketleme (İmzalama)
        script: |
          # Uygulamayı senin imzanla App Store formatında paketler
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa