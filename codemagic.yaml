workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.swapbarter.app
    scripts:
      - name: 1 - Hazirlik ve Web Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform Kurulumu
        script: |
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: 3 - Sertifika ve Profil Otomasyonu (Zorlamali Temizlik)
        script: |
          # Bu komut Apple tarafındaki tüm profilleri temizler ve yenisini tescil eder
          app-store-connect fetch-signing-files "$XCODE_APP_ID" --type IOS_APP_STORE --create --clean
          keychain add-certificates
      - name: 4 - iOS IPA Dosyasi Uret
        script: |
          # Artik her sey sifirlandi, tertemiz paket cikariyoruz
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa