workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys # Paneldeki grup adıyla aynı olmalı
      node: latest
      xcode: latest
    scripts:
      - name: 1 - Hazirlik ve Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform Senkronizasyon
        script: |
          npx cap sync ios
      - name: 3 - Manuel Sertifika Kurulumu
        script: |
          # Buluttaki Mac'in anahtar zincirini hazırlar
          keychain initialize
          # Yüklediğin .p12 ve .mobileprovision dosyalarını sisteme tanıtır
          keychain add-certificates --certificate "$CM_CERTIFICATE" --certificate-password "$CM_CERTIFICATE_PASSWORD"
          provisioning-profile add --provisioning-profile "$CM_PROVISIONING_PROFILE"
      - name: 4 - iOS IPA Paketleme
        script: |
          # Uygulamanı senin imzanla paketler
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa