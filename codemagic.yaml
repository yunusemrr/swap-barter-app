workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys 
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 1 - Hazırlık ve Web Derleme
        script: |
          npm install
          npm run build
          npx cap sync ios
      - name: 2 - Full iOS Signing & Build (TEK ADIMDA BİTİRİŞ)
        script: |
          # 1. Metin kodlarını (Base64) tekrar gerçek dosyalara çevir
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # 2. Sertifikayı anahtar zincirine kur
          keychain initialize
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # 3. İzin Belgesini (Profile) Apple klasörüne yerleştir
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp /tmp/profile.mobileprovision "$PROFILES_DIR/"
          
          # 4. Profil içinden isim ve UUID bilgilerini çek (Aynı script içindeyiz, hata lüksü yok)
          PROFILE_NAME=$(security cms -D -i /tmp/profile.mobileprovision | grep -aA1 "Name" | grep string | sed -e 's/<string>//' -e 's/<\/string>//' -e 's/^[[:space:]]*//')
          PROFILE_UUID=$(grep -aA1 "UUID" /tmp/profile.mobileprovision | grep -o "[-A-Z0-9]\{36\}")
          
          echo "✅ Şantiyedeki Profil: $PROFILE_NAME ($PROFILE_UUID)"
          
          # 5. Paketleme Ayar Dosyasını (plist) Oluştur
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$XCODE_APP_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # 6. PAKETLEME (IPA Üretimi)
          # Değişkenleri doğrudan bu komutun içine paslıyoruz
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "/Users/builder/export_options.plist" \
            --archive-flags "PROVISIONING_PROFILE=\"$PROFILE_UUID\" PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual"
    artifacts:
      - build/ios/ipa/*.ipa