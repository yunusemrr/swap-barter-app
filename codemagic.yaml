workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Paketi ve Bagimliliklari Kur
        script: npm install
      - name: Web Kodlarini Derle (React)
        script: npm run build
      - name: iOS Platformunu Garantiye Al
        script: |
          # Eger klasor yoksa bulutta sifirdan yarat, varsa hata verme devam et
          npx cap add ios || echo "iOS klasoru zaten mevcut, devam ediliyor."
          npx cap sync ios
      - name: Podlari Kur (Workspace Olustur)
        script: |
          cd ios/App
          pod install --repo-update
      - name: iOS Uygulamasini Insa Et
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO