workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Temel Bagimliliklari Kur
        script: npm install
      - name: iOS Malzemelerini Zorla Getir
        script: npm install @capacitor/ios
      - name: Web Kodlarini Derle (React)
        script: npm run build
      - name: Zemini Temizle ve iOS Temelini Sifirdan At
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Podlari Kur (Workspace Olustur)
        script: |
          cd ios/App
          pod install --repo-update
      - name: iOS Uygulamasini Insa Et
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO