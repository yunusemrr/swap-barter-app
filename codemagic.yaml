workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys 
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 1 - Bağımlılıkları Yükle ve Web Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform Senkronizasyon (Capacitor)
        script: |
          npx cap sync ios
      - name: 3 - Manuel Sertifika ve Profil Kurulumu
        script: |
          # 1. Anahtar Zinciri Hazırlığı
          keychain initialize
          
          # 2. Sertifika (.p12) Kurulumu
          keychain add-certificates \
            --certificate "$CM_CERTIFICATE" \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # 3. Provisioning Profile Kurulumu (Manuel Kopyalama)
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$CM_PROVISIONING_PROFILE" "$PROFILES_DIR/"
          echo "✅ Sertifika ve Profil hazır!"
      - name: 4 - iOS IPA Paketleme (Final)
        script: |
          # Hatalı olan '--export-method' kısmını kaldırdık. 
          # Xcode, yüklediğimiz profilleri otomatik olarak eşleştirecek.
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa