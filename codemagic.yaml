workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      # Bu blok paneldeki anahtarlarını otomatik eşleştirir
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.swapbarter.app
    scripts:
      - name: 1 - Hazirlik ve Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Altyapisi
        script: |
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: 3 - iOS IPA Dosyasi Uret (Otomatik Imzalama)
        script: |
          # Bu komut paneldeki entegrasyonu kullanarak imzayı atar
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
      - name: 4 - Apple Sertifikalarini Otomatik Olustur ve Yukle
        script: |
          # Bu komut senin yerine Apple'a gider, sertifika yoksa kendisi olusturur ve indirir
          app-store-connect fetch-signing-files "$XCODE_APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
    artifacts:
      - build/ios/ipa/*.ipa