workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Bagimliliklari Kur
        script: npm install
      - name: Web Kodlarini Derle
        script: npm run build
      - name: Hatali Klasoru Sil ve Sifirdan iOS Yarat
        script: |
          set -e
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: iOS Uygulamasini Insa Et
        script: |
          set -e
          cd ios/App
          pod install
          xcodebuild build -workspace App.xcworkspace -scheme App -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO