workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Hazirlik
        script: |
          npm install
          npm run build
      - name: Capacitor Esitleme
        script: |
          npx cap sync ios
      - name: iOS Derleme
        script: |
          cd ios/App
          pod install
          xcodebuild build -workspace App.xcworkspace -scheme App -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO