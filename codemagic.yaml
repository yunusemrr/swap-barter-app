workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys 
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 1 - Hazırlık ve Web Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Senkronizasyon
        script: |
          npx cap sync ios
      - name: 3 - Full iOS Signing & Build (TEK ADIM)
        script: |
          # 1. Anahtarları Kur
          keychain initialize
          keychain add-certificates --certificate "$CM_CERTIFICATE" --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # 2. Profili Kur ve Bilgilerini Çek
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$CM_PROVISIONING_PROFILE" "$PROFILES_DIR/"
          
          # Profilin gerçek adını ve UUID'sini dosyanın içinden söküp alıyoruz
          PROFILE_NAME=$(security cms -D -i "$CM_PROVISIONING_PROFILE" | grep -aA1 "Name" | grep string | sed -e 's/<string>//' -e 's/<\/string>//' -e 's/^[[:space:]]*//')
          PROFILE_UUID=$(grep -aA1 "UUID" "$CM_PROVISIONING_PROFILE" | grep -o "[-A-Z0-9]\{36\}")
          
          echo "✅ Profil Adı: $PROFILE_NAME"
          echo "✅ Profil UUID: $PROFILE_UUID"

          # 3. Export Options Dosyasını Şimdi Oluştur (Garantili)
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$XCODE_APP_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          # 4. Arşivleme ve Paketleme (İsim ve UUID ile zorlayarak)
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "/Users/builder/export_options.plist" \
            --archive-flags "PROVISIONING_PROFILE=\"$PROFILE_UUID\" PROVISIONING_PROFILE_SPECIFIER=\"$PROFILE_NAME\" CODE_SIGN_STYLE=Manual"
    artifacts:
      - build/ios/ipa/*.ipa