workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        XCODE_CONFIGURATION: "Release"

    scripts:
      - name: 1 - Node ve Web Build
        script: |
          npm install
          npm run build
          npx cap sync ios

      - name: 2 - iOS Signing & Build
        script: |
          # Base64 → gerçek dosyalar
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision

          # Keychain kur
          keychain initialize
          keychain add-certificates \
            --certificate /tmp/cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Profile kopyala
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp /tmp/profile.mobileprovision "$PROFILES_DIR/"

          # UUID çek
          PROFILE_UUID=$(/usr/libexec/PlistBuddy \
            -c 'Print :UUID' \
            /dev/stdin \
            <<< $(security cms -D -i /tmp/profile.mobileprovision))

          echo "✅ Profile UUID: $PROFILE_UUID"

          # Detaylı xcodebuild ile archive (hata görmek için)
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$(security cms -D -i /tmp/profile.mobileprovision | grep -A1 'TeamIdentifier' | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/' | tr -d '[:space:]')" \
            2>&1

          # export_options.plist oluştur
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$XCODE_APP_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          # IPA üret
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/export_options.plist \
            2>&1

    artifacts:
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true