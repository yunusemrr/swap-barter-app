workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 1 - Hazırlık ve Web Derleme
        script: |
          npm install
          npm run build
          npx cap sync ios

      - name: 2 - Full iOS Signing & Build
        script: |
          # Base64 → gerçek dosyalar
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision

          # Keychain kur
          keychain initialize
          keychain add-certificates \
            --certificate /tmp/cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Profile kopyala
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp /tmp/profile.mobileprovision "$PROFILES_DIR/"

          # UUID'yi düzgün çek (tek satır, trim edilmiş)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy \
            -c 'Print :UUID' \
            /dev/stdin \
            <<< $(security cms -D -i /tmp/profile.mobileprovision))

          echo "✅ Profile UUID: $PROFILE_UUID"

          # export_options.plist oluştur
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$XCODE_APP_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          # IPA üret
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "/tmp/export_options.plist" \
            --archive-flags \
              "PROVISIONING_PROFILE=$PROFILE_UUID \
               CODE_SIGN_STYLE=Manual"

    artifacts:
      - build/ios/ipa/*.ipa