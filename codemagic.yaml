workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys 
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 1 - Bağımlılıklar ve Web Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Senkronizasyon
        script: |
          npx cap sync ios
      - name: 3 - Sertifika ve Profil Hazırlığı
        script: |
          # 1. Anahtar Zinciri Hazırlığı
          keychain initialize
          keychain add-certificates \
            --certificate "$CM_CERTIFICATE" \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # 2. Profil Kurulumu
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$CM_PROVISIONING_PROFILE" "$PROFILES_DIR/"
          
          # 3. Profil İsmini Otomatik Çıkar (Çok Kritik!)
          # Bu komut yüklediğin .mobileprovision dosyasının içindeki gerçek ismi bulur
          PROV_PROFILE_NAME=$(security cms -D -i "$CM_PROVISIONING_PROFILE" | grep -aA1 "Name" | grep string | sed -e 's/<string>//' -e 's/<\/string>//' -e 's/^[[:space:]]*//')
          echo "export PROV_PROFILE_NAME=\"$PROV_PROFILE_NAME\"" >> $CM_ENV
          echo "✅ Kullanılacak Profil: $PROV_PROFILE_NAME"
      - name: 4 - Export Options ve Paketleme (KESİN ÇÖZÜM)
        script: |
          # Teslimat belgesini (plist) detaylıca oluşturuyoruz
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$XCODE_APP_ID</key>
              <string>$PROV_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # Arşivleme ve IPA oluşturma (Profil ismini zorla dikte ediyoruz)
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "/Users/builder/export_options.plist" \
            --archive-flags "PROVISIONING_PROFILE_SPECIFIER=\"$PROV_PROFILE_NAME\" CODE_SIGN_STYLE=Manual"
    artifacts:
      - build/ios/ipa/*.ipa