workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
        # BURAYA APPLE'DAN ALDIĞIN BİLGİLERİ YAZACAĞIZ:
        APP_STORE_CONNECT_ISSUER_ID: "Bc59276ff-e782-484f-9667-fefae5e6c18e"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "BNA5FF3CHA"
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg3XDTz0QcBMDUUVTi
          gn5zlv5oS5wpSzHcPtXxzCjVaDygCgYIKoZIzj0DAQehRANCAASz3QSpzb2YV84o
          zMduf+ia7PZvyP+p8rUVWRsHKCK+UQkKOHtQzvpiDImFQQ66GBtZUZhXtgw0FToa
          bOij/ioq
          -----END PRIVATE KEY-----
    scripts:
      - name: 1 - Hazirlik ve Web Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform Kurulumu
        script: |
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: 3 - Sertifika ve Profil Alımı
        script: |
          # Bu sefer anahtarları elinle verdiğimiz için hata veremeyecek
          app-store-connect fetch-signing-files "$XCODE_APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: 4 - iOS IPA Dosyasi Uret
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa