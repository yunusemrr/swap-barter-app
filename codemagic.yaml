workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - AppleKeys 
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
    scripts:
      - name: 1 - Hazırlık
        script: |
          npm install
          npm run build
          npx cap sync ios
      - name: 2 - Sertifika ve Profil Çözücü (Base64 Decode)
        script: |
          # Kodları tekrar dosyaya çeviriyoruz
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # Keychain'e ekle
          keychain initialize
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # Profile klasörüne taşı
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp /tmp/profile.mobileprovision "$PROFILES_DIR/"
      - name: 3 - Paketleme
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa