workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      # İŞTE EKSİK OLAN KISIM BURASIYDI:
      groups:
        - AppleKeys # Az once panelde olusturdugumuz grubun adi
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
    scripts:
      - name: 1 - Hazirlik ve Derleme
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform Kurulumu
        script: |
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: 3 - Apple Sertifika ve Profil Otomasyonu
        script: |
          # Artik 'AppleKeys' grubunu okudugu icin anahtarlari bulacak
          app-store-connect fetch-signing-files "$XCODE_APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: 4 - iOS IPA Paketleme
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa