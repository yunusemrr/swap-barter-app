workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Bagimliliklari Kur
        script: npm install
      - name: Web Kodlarini Derle
        script: npm run build
      - name: Capacitor Guncelle
        script: npx cap sync ios
      - name: Podlari Kur
        script: |
          cd ios/App
          pod install --repo-update
      - name: iOS Uygulamasini Insa Et
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -destination generic/platform=iOS CODE_SIGNING_ALLOWED=NO