workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - AppleKeys # Buranın paneldeki isimle AYNI olduğundan (büyük/küçük harf) emin ol!
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app"
    scripts:
      - name: 1 - Hazirlik
        script: |
          npm install
          npm run build
      - name: 2 - iOS Platform
        script: |
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: 3 - Apple Sertifika ve Profil (Tam Yetki)
        script: |
          # Anahtarlari panelden okumasi icin zorluyoruz
          app-store-connect fetch-signing-files "$XCODE_APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          
          keychain add-certificates
      - name: 4 - iOS IPA Paketleme
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa