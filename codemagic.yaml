workflows:
  ios-capacitor-build:
    name: Swap Barter iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        XCODE_APP_ID: "com.swapbarter.app" # Burasi senin appId bilgin
    scripts:
      - name: 1 - Bagimliliklari Kur
        script: npm install
      - name: 2 - Web Projesini Derle
        script: npm run build
      - name: 3 - iOS Altyapisini Sifirla
        script: |
          set -e
          rm -rf ios
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios
      - name: 4 - Apple Sertifikalarini Yukle (Signing)
        script: |
          # Codemagic bu komutla senin Apple hesabina baglanip sertifika alir
          app-store-connect fetch-signing-files "$XCODE_APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: 5 - iOS Uygulamasini Paketle (.IPA)
        script: |
          set -e
          # Artik modern SPM sistemiyle IPA uretiyoruz
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa